<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问受限 - WebSSH</title>
  <link href="static/img/favicon-32.png" rel="icon" type="image/png">
  <style>
    :root { --card-bg: #ffffff; --text: #2d3436; --text-secondary: #636e72; --text-muted: #b2bec3; --danger: #d63031; --danger-bg: #fff5f5; --danger-border: #fecaca; --accent: #0984e3; --shadow: 0 2px 24px rgba(0,0,0,0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text); }
    .blocked-container { width: 420px; padding: 1rem; }
    .blocked-card { background: var(--card-bg); border-radius: 12px; padding: 2.5rem 2.2rem; box-shadow: var(--shadow); border: 1px solid #eee; text-align: center; }
    .blocked-icon { width: 64px; height: 64px; background: var(--danger-bg); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1.2rem; }
    .blocked-icon i { font-size: 28px; color: var(--danger); }
    .blocked-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .blocked-reason { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.5rem; }
    .blocked-footer { font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem; }
  </style>
  <link href="static/css/fontawesome.min.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="blocked-container">
    <div class="blocked-card">
      <div class="blocked-icon"><i class="fas fa-lock"></i></div>
      <h1 class="blocked-title">访问受限</h1>
      <p class="blocked-reason">由于连续多次密码输入错误，当前 IP 已被暂时锁定。<br>请稍后再尝试登录。</p>
      <div class="blocked-footer"><i class="fas fa-shield-alt"></i> WebSSH · 安全保护</div>
    </div>
  </div>
</body>
</html>
