<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSSH Console</title>
  <link href="static/img/favicon-32.png" rel="icon" type="image/png">
  <link href="static/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
  <link href="static/css/xterm.min.css" rel="stylesheet" type="text/css" />
  <link href="static/css/fullscreen.min.css" rel="stylesheet" type="text/css" />
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WebSSH">
  <link rel="apple-touch-icon" href="static/img/favicon-32.png">
  <style>
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #34495e;
      --accent-color: #3498db;
      --danger-color: #e74c3c;
      --success-color: #2ecc71;
      --warning-color: #f1c40f;
      --light-bg: #ecf0f1;
      --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .main-container {
      max-width: 1000px;
      width: 100%;
      padding: 2rem;
      /* 移动内边距到容器 */
    }

    .form-container {
      background: white;
      border-radius: 15px;
      box-shadow: var(--card-shadow);
      padding: 2.5rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      height: auto;
      /* 改为自动高度 */
    }

    .page-title {
      color: var(--primary-color);
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 2rem;
      text-align: center;
      position: relative;
    }

    .page-title:after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background: var(--accent-color);
      margin: 1rem auto;
      border-radius: 2px;
    }

    .form-control {
      border: 2px solid #eee;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      /* 增加内边距 */
      height: calc(3rem + 2px);
      /* 设置固定高度 */
      line-height: 1.5;
      /* 设置行高 */
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .form-control:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      background: white;
    }

    label {
      font-weight: 500;
      color: var(--secondary-color);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-section {
      margin-bottom: 1.5rem;
    }

    .btn {
      border-radius: 8px;
      padding: 0.8rem 1.5rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: var(--accent-color);
      border: none;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2);
    }

    .btn-primary:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--danger-color);
      border: none;
    }

    .btn-info {
      background: var(--success-color);
      border: none;
    }

    #waiter {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 1.5rem 3rem;
      border-radius: 50px;
      font-size: 1.1rem;
      backdrop-filter: blur(5px);
      z-index: 1000;
    }

    #terminal {
      margin-top: 1.5rem;
      border-radius: 10px;
      overflow: visible;
      box-shadow: var(--card-shadow);
      opacity: 0;
      transition: opacity 0.2s;
    }
    #terminal.ready {
      opacity: 1;
    }
    /* Fix Chinese character clipping on mobile: allow rows to overflow */
    .xterm .xterm-rows > div {
      overflow: visible !important;
    }
    .xterm .xterm-rows span {
      height: auto !important;
    }

    #sshlink {
      height: 70px;
      /* 固定高度 */
      flex: 1;
      overflow-x: auto;
      white-space: nowrap;
      margin: 0;
      padding: 0.5rem 1rem;
      background: var(--light-bg);
      border-radius: 8px;
      font-size: 0.9rem;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .link-text {
      padding: 0.5rem;
      flex: 1;
      overflow-x: scroll;
      white-space: nowrap;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .link-text::-webkit-scrollbar {
      display: none;
    }

        .action-buttons {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      margin-bottom: 2rem;
      /* 添加底部间距 */
    }

    .button-group {
      display: flex;
      gap: 1rem;
      flex-shrink: 0;
      /* 防止按钮被压缩 */
    }

    /* 文件选择按钮的基本样式 */
    .file-btn {
      /* 移除右上角和右下角的圆角 */
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      /* 设置内边距,使按钮更大更易点击 */
      padding: 0.8rem 1.2rem;
      /* 使用预定义的主题色作为背景色 */
      background: var(--secondary-color);
      /* 移除边框 */
      border: none;
      /* 添加过渡效果,使样式变化更平滑 */
      transition: all 0.3s ease;
      /* 设置相对定位,为光效动画做准备 */
      position: relative;
      /* 隐藏超出按钮范围的内容 */
      overflow: hidden;
    }

    /* 鼠标悬停时的按钮样式 */
    .file-btn:hover {
      /* 添加渐变背景,使按钮更有层次感 */
      background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
      /* 添加发光效果 */
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
    }

    /* 创建光效动画的元素 */
    .file-btn:before {
      /* 创建伪元素 */
      content: '';
      /* 绝对定位,相对于按钮定位 */
      position: absolute;
      top: 0;
      /* 初始位置在按钮左侧外部 */
      left: -100%;
      width: 100%;
      height: 100%;
      /* 创建透明渐变,形成光效 */
      background: linear-gradient(120deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent);
      /* 添加过渡效果 */
      transition: 0.5s;
    }

    /* 鼠标悬停时触发光效动画 */
    .file-btn:hover:before {
      /* 将光效移动到按钮右侧,形成扫光效果 */
      left: 100%;
    }

    .file-input {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      background: #f8f9fa;
    }

    .input-group-btn {
      margin: 0;
      padding: 0;
    }

    .copy-btn {
      color: var(--primary-color);
      margin-left: auto;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1rem;
      }

      .form-container {
        padding: 1.5rem;
      }

      .btn {
        width: 100%;
        margin-bottom: 0.5rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .button-group {
        width: 100%;
        flex-direction: column;
      }

      #sshlink {
        width: 100%;
      }
    }

    /* Desktop compact: reduce padding so form fits one screen */
    @media (min-width: 769px) {
      .form-container {
        padding: 1.5rem 2rem;
      }

      .page-title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }

      .form-section {
        margin-bottom: 0.75rem;
      }

      .form-control {
        padding: 0.5rem 0.75rem;
        height: calc(2.2rem + 2px);
      }

      .action-buttons {
        margin-top: 0.75rem;
        margin-bottom: 0;
      }

      label {
        margin-bottom: 0.2rem;
        font-size: 0.8rem;
      }
    }

    {% if font.family %}

    @font-face {
      font-family: '{{ font.family }}';
      src: url('{{ font.url }}');
    }

    body {
      font-family: '{{ font.family }}',
      -apple-system,
      BlinkMacSystemFont,
      'Segoe UI',
      system-ui,
      Roboto,
      Oxygen,
      Ubuntu,
      Cantarell,
      'Open Sans',
      'Helvetica Neue',
      sans-serif;
      background: linear-gradient(135deg, #f6f8fa 0%, #e9ecef 100%);
      min-height: 100vh;
      padding: 0;
      /* 移除原有内边距 */
      color: var(--primary-color);
      display: flex;
      /* 添加flex布局 */
      align-items: center;
      /* 垂直居中 */
      justify-content: center;
      /* 水平居中 */
      margin: 0;
    }

    {% end %}
  </style>
  <link href="static/css/fontawesome.min.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <script>
    window.ALLOW_URL_COMMAND = {% if allow_url_command %}true{% else %}false{% end %};

  </script>
  
  <div id="waiter" style="display: none">正在建立连接...</div>

  <div class="main-container">
    <div class="form-container" style="display: none">
      <h1 class="page-title">WebSSH Console</h1>

      <form id="connect" action="" method="post" enctype="multipart/form-data" {% if debug %} novalidate{% end %}>
        <div class="form-section">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="hostname">主机地址 (Hostname)</label>
              <div style="position:relative;">
                <input class="form-control" type="text" id="hostname" name="hostname" value="" required
                  placeholder="请输入主机地址" autocomplete="off"
                  style="padding-right:36px;">
                <button type="button" id="hostname-history-btn" title="连接历史" tabindex="-1"
                  style="position:absolute; right:2px; top:2px; bottom:2px; width:30px;
                    border:none; background:transparent; color:#999; cursor:pointer;
                    font-size:12px; border-radius:6px; display:flex; align-items:center; justify-content:center;">
                  &#9660;
                </button>
                <ul id="hostname-history-list"
                  style="display:none; position:absolute; top:100%; left:0; right:0; z-index:1000;
                    background:#fff; border:1px solid #e0e0e0; border-radius:6px;
                    box-shadow:0 2px 8px rgba(0,0,0,0.08); list-style:none;
                    padding:4px 0; margin:2px 0 0 0; max-height:160px; overflow-y:auto;">
                </ul>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="port">端口 (Port)</label>
              <input class="form-control" type="number" id="port" name="port" placeholder="22" value="" min=1 max=65535>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="username">用户名 (Username)</label>
              <div style="position:relative;">
                <input class="form-control" type="text" id="username" name="username" value="" required
                  placeholder="请输入用户名" autocomplete="off"
                  style="padding-right:36px;">
                <button type="button" id="username-history-btn" title="用户名历史" tabindex="-1"
                  style="position:absolute; right:2px; top:2px; bottom:2px; width:30px;
                    border:none; background:transparent; color:#999; cursor:pointer;
                    font-size:12px; border-radius:6px; display:flex; align-items:center; justify-content:center;">
                  &#9660;
                </button>
                <ul id="username-history-list"
                  style="display:none; position:absolute; top:100%; left:0; right:0; z-index:1000;
                    background:#fff; border:1px solid #e0e0e0; border-radius:6px;
                    box-shadow:0 2px 8px rgba(0,0,0,0.08); list-style:none;
                    padding:4px 0; margin:2px 0 0 0; max-height:160px; overflow-y:auto;">
                </ul>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="password">密码 (Password)</label>
              <input class="form-control" type="password" id="password" name="password" value="" placeholder="请输入密码">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="privatekey">私钥 (Private Key)</label>
              <div class="input-group">
                <label class="input-group-btn">
                  <span class="btn btn-primary file-btn">
                    <i class="fas fa-folder-open"></i> 选择文件
                    <input type="file" id="privatekey" name="privatekey" style="display: none;"
                      onchange="document.getElementById('showFilename').value = this.files.length ? this.files[0].name : '未选择文件'">
                  </span>
                </label>
                <input type="text" class="form-control file-input" id="showFilename" placeholder="未选择私钥文件" readonly>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="passphrase">密钥口令 (Passphrase)</label>
              <input class="form-control" type="password" id="passphrase" name="passphrase" value=""
                placeholder="如果需要请输入密钥口令">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="row">
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="use_tmux">
                <label class="form-check-label" for="use_tmux" style="font-weight:normal; font-size:0.85rem;">
                  连接后自动 tmux attach（断线恢复）
                </label>
              </div>
            </div>
          </div>
        </div>

        <input type="hidden" id="term" name="term" value="xterm-256color">
        {% module xsrf_form_html() %}

        <div class="action-buttons">
          <div class="button-group">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-terminal"></i> 连接
            </button>
            
          </div>
        </div>

        <div id="status" style="color: var(--danger-color); text-align: center; margin-top: 0.5rem; min-height: 1.5em;"></div>
        
      </form>
    </div>

    <div class="terminal-container">
      <div id="terminal"></div>
    </div>
  </div>

  <script src="static/js/jquery.min.js"></script>
  <script src="static/js/popper.min.js"></script>
  <script src="static/js/bootstrap.min.js"></script>
  <script src="static/js/xterm.min.js"></script>
  <script src="static/js/xterm-addon-fit.min.js"></script>
  <script src="static/js/main.js"></script>
</body>

</html>
