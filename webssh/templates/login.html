<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - WebSSH</title>
  <link href="static/img/favicon-32.png" rel="icon" type="image/png">
  <style>
    :root {
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --text: #2d3436;
      --text-secondary: #636e72;
      --text-muted: #b2bec3;
      --accent: #0984e3;
      --accent-hover: #0768b8;
      --danger: #d63031;
      --danger-bg: #fff5f5;
      --danger-border: #fecaca;
      --warning: #e17055;
      --input-bg: #f8f9fa;
      --input-border: #dfe6e9;
      --shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
    }
    .login-container { width: 400px; padding: 1rem; }
    .login-card {
      background: var(--card-bg); border-radius: 12px;
      padding: 2.5rem 2.2rem; box-shadow: var(--shadow); border: 1px solid #eee;
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 56px; height: 56px; background: var(--accent); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem;
    }
    .logo-icon i { font-size: 24px; color: white; }
    .login-title { font-size: 1.35rem; font-weight: 700; color: var(--text); }
    .login-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.3rem; }
    .error-msg {
      background: var(--danger-bg); border: 1px solid var(--danger-border);
      border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1.5rem;
      color: var(--danger); font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;
      animation: shakeIn 0.4s ease;
    }
    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .remaining-hint {
      font-size: 0.78rem; color: var(--warning); margin-top: 0.4rem;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.4rem;
    }
    .form-group label i { font-size: 0.75rem; width: 16px; text-align: center; color: var(--accent); }
    .input-wrapper { position: relative; }
    .form-input {
      width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border);
      border-radius: 8px; padding: 0.65rem 1rem; padding-right: 2.5rem;
      font-size: 0.9rem; color: var(--text); transition: all 0.2s ease; outline: none;
    }
    .form-input::placeholder { color: var(--text-muted); font-size: 0.82rem; }
    .form-input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,132,227,0.12); background: #fff;
    }
    .form-input[name="password"] { letter-spacing: 2px; font-family: monospace; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 0.9rem; padding: 4px; transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--text-secondary); }
    .btn-login {
      width: 100%; padding: 0.75rem; background: var(--accent); border: none;
      border-radius: 8px; color: white; font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s ease; margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-login:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(9,132,227,0.25); }
    .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: var(--text-muted); }
    @media (max-width: 480px) {
      .login-container { width: 100%; padding: 1rem; }
      .login-card { padding: 2rem 1.5rem; }
    }
  </style>
  <link href="static/css/fontawesome.min.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-lock"></i></div>
        <h1 class="login-title">WebSSH Console</h1>
        <p class="login-subtitle">请输入密码以继续访问</p>
      </div>
      {% if error %}
      <div class="error-msg"><i class="fas fa-exclamation-circle"></i><span>{{ error }}</span></div>
      {% end %}
      <form method="post" action="/login">
        {% module xsrf_form_html() %}
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> 用户名</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required autocomplete="username" autofocus
              value="{{ username or '' }}">
          </div>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-key"></i> 密码</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePwd" title="显示/隐藏密码"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        {% if remaining is not None and remaining <= 3 and remaining > 0 %}
        <div class="remaining-hint">
          &#x26A0;
          还剩 <strong>{{ remaining }}</strong> 次尝试机会
        </div>
        {% end %}
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> 登 录</button>
      </form>
      <div class="login-footer"><i class="fas fa-shield-alt"></i> 安全连接 &middot; WebSSH</div>
    </div>
  </div>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function() {
      var pwd = document.getElementById('password');
      var icon = this.querySelector('i');
      if (pwd.type === 'password') {
        pwd.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash');
        pwd.style.letterSpacing = '1px';
      } else {
        pwd.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye');
        pwd.style.letterSpacing = '2px';
      }
    });
  </script>
</body>
</html>
